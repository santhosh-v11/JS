<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quotes Manager</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-gray-100 min-h-screen ">

  <h2 class="p-5 text-2xl font-semibold text-center">Quotes Manager</h2>
  <div class="border border-amber-500 w-fit p-5 mx-auto rounded-2xl">
    <!-- <h2 class="font-serif text-lg">Write your quote here</h2> -->
    <input type="text" name="qt" id="qt" class="border-2 w-full rounded-lg p-2 bg-amber-100 border-yellow-400" placeholder="Write your quote here">
    <button type="button" class="bg-yellow-300 px-2 p-1 font-semibold mt-5 w-fit  rounded-2xl" id="addQuoteBtn"> Add Quote !</button>
  </div>

 <div class="mx-auto w-fit mt-5">
  <h1 class="text-2xl font-semibold text-center">Your Quotes</h1>
  <div id="quotesContainer" class="mx-auto w-fit mt-5 space-y-3"></div>
</div>


  <script src="./main.js"></script>
</body>
</html>
