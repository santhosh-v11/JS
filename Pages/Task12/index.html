<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Search Filter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <main class=" h-dvh bg-[url(./bg0.jpeg)] bg-contain bg-black/50 bg-blend-multiply">
        <h2 class="p-10 text-center text-2xl font-semibold text-white bg-black/20">Choose your Favourite Language  </h2>

        <div class="bg-gray-200 w-fit p-5 rounded-2xl mx-auto">
            <input type="search" name="lan" id="lan" placeholder="Search here"><span><i class="fa-solid fa-magnifying-glass"></i></span>
            <ul class=""> 
                <li class="bg-gray-100 my-2 px-2 p-1 rounded-lg shadow-md hover:shadow-lg hover:scale-105 transition duration-100">JavaScript</li>
                <li class="bg-gray-100 my-2 px-2 p-1 rounded-lg shadow-md hover:shadow-lg hover:scale-105 transition duration-100">TypeScript</li>
                <li class="bg-gray-100 my-2 px-2 p-1 rounded-lg shadow-md hover:shadow-lg hover:scale-105 transition duration-100">Python</li>
                <li class="bg-gray-100 my-2 px-2 p-1 rounded-lg shadow-md hover:shadow-lg hover:scale-105 transition duration-100">Java</li>
                <li class="bg-gray-100 my-2 px-2 p-1 rounded-lg shadow-md hover:shadow-lg hover:scale-105 transition duration-100">C#</li>
                <li class="bg-gray-100 my-2 px-2 p-1 rounded-lg shadow-md hover:shadow-lg hover:scale-105 transition duration-100">C</li>
                <li class="bg-gray-100 my-2 px-2 p-1 rounded-lg shadow-md hover:shadow-lg hover:scale-105 transition duration-100">C++ </li>
                <li class="bg-gray-100 my-2 px-2 p-1 rounded-lg shadow-md hover:shadow-lg hover:scale-105 transition duration-100">Golang</li>
                <li class="bg-gray-100 my-2 px-2 p-1 rounded-lg shadow-md hover:shadow-lg hover:scale-105 transition duration-100">.NET</li>
                <li class="bg-gray-100 my-2 px-2 p-1 rounded-lg shadow-md hover:shadow-lg hover:scale-105 transition duration-100">Rust</li>
                <li class="bg-gray-100 my-2 px-2 p-1 rounded-lg shadow-md hover:shadow-lg hover:scale-105 transition duration-100">Swift</li>
                <li class="bg-gray-100 my-2 px-2 p-1 rounded-lg shadow-md hover:shadow-lg hover:scale-105 transition duration-100">SQL</li>
            </ul>
        </div>
    </main>
    <script type="module" src="./main.js"></script>
</body>
</html>
