<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Random Background Changer</title>
</head>
<body>
     <div  class="border-2 rounded-2xl w-fit mx-auto p-10 bg-black/20 mt-50">
    <div  class="mx-auto text-center">
      <h1 class="font-serif  text-2xl">Random Background Changer</h1>
      <div>
        <button id="red"  class="mt-5 px-4 bg-white text-black font-mono rounded-full">Red</button>
        <button id="green" class="mt-5 px-4 bg-white text-black font-mono rounded-full">Green</button>
        <button id="blue" class="mt-5 px-4 bg-white text-black font-mono rounded-full">Blue</button>
        <button id="violet" class="mt-5 px-4 bg-white text-black font-mono rounded-full">Violet</button>
        <button id="pink" class="mt-5 px-4 bg-white text-black font-mono rounded-full">Pink</button>
        <button id="random" class="block mt-5 mx-auto bg-white text-black font-mono rounded-full px-3" >Random Bg Colors</button>
      </div>
    </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
