<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Text Formatter</title>
</head>

<body class="dark:bg-black dark:text-amber-50">

    <header class="flex justify-around p-6 pb-0">
        <p class="text-2xl inline font-serif font-semibold"> Text Formatter</p>
        <!-- <button class="text-end bg-yellow-800 px-2 p-1 rounded-2xl text-white" id="theme">Toogle</button> -->
    <button class="w-20 h-10 rounded-full bg-white flex items-center transition duration-300 focus:outline-none shadow" id="themebtn">
        <div id="switch-toggle" class="w-12 h-12 relative rounded-full transition duration-500 transform bg-yellow-500 -translate-x-2 p-1 text-white">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        </div>
    </button>

        

    </header>
    <main class="grid place-content-center  w-screen  ">
       
            

     
        <div class="flex justify-center  w-screen p-40 gap-2 ">
            <div class="flex-1 p-5 border-4 border-amber-300 rounded-2xl ">
                <label for="text" class=" text-lg font-serif p-1"><i class="fa-solid fa-pen-to-square"></i> Enter Your text </label>
                <textarea name="text" id="text" class="w-full h-fit resize-y p-2  bg-gray-200 rounded-lg dark:text-black" rows="8">  </textarea>
                <div class="">
                    <p>No of Characters <span id="ch"></span></p>
                    <p>No of Words <span id="word"></span> </p>
                </div>
                <button type="button" class=" left-149 top-2 mt-2  bg-gray-300  rounded-sm px-2 text-black font-semibold" id="clrbtn">Clear Text</button>
            </div>
            <div class="flex-1 p-5 bg-amber-200 rounded-2xl dark:text-black">
            <h2 class="pb-2 ">Choose Format Option</h2>
            <div class="grid grid-cols-1 gap- place-content-center ">
                <div class="flex items-center space-x-2">
                    <input type="checkbox" class="accent-green-600 " name="uppercase" id="uppercase">
                    <label for="uppercase" class=" font-semibold">UPPERCASE</label>
                </div>
                <div class="flex  items-center space-x-2">
                    <input type="checkbox" class="accent-green-600" name="lowercase" id="lowercase">
                    <label for="lowercase" class="font-semibold">lowercase</label>
                </div>
                <div class="flex  items-center space-x-2">
                    <input type="checkbox" class="accent-green-600" name="sentencecase" id="sentencecase">
                    <label for="sentencecase" class="font-semibold">Sentencecase</label>
                </div>
                <div class="flex  items-center space-x-2">
                    <input type="checkbox" class="accent-green-600" name="titlecase" id="titlecase">
                    <label for="titlecase" class="font-semibold">Title Case</label>
                </div>
            </div>

            </div>
        </div>

    </main>
    <script type="module" src="./main.js"></script>
</body>

</html>
