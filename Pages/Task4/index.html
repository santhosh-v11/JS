<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Greet Bot</title>
</head>
<body>
     <div class="h-screen w-full  bg-red-300 p-10">
      <div class="mx-auto flex flex-col items-start text-center bg-gray-200 w-fit p-5 rounded-4xl">
        <label for="name" class="text-2xl pl-2 font-semibold ">Enter Name</label>
        <input type="text" id="name" placeholder="Enter Name here " class="text-2xl bg-white/50 rounded-lg p-2 font-extralight px-2">
        <button class="bg-green-400 block mx-auto px-3 rounded-full mt-5" id="btn" >Submit!</button>
      </div>
        <h2 class="mt-5 text-green-700 text-center  font-extralight text-3xl" id="msg"></h2>

    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
